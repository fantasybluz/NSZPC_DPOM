version: '3.8'

services:
  app:
    build: .
    container_name: nszpc-${ENV:-dev}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - app-data:/app/data
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  app-data:
    driver: local
