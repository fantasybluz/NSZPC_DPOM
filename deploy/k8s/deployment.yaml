apiVersion: apps/v1
kind: Deployment
metadata:
  name: nszpc-app
  namespace: nszpc
  labels:
    app: nszpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nszpc
  template:
    metadata:
      labels:
        app: nszpc
    spec:
      containers:
        - name: nszpc
          image: nszpc-dpom:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nszpc-data-pvc
