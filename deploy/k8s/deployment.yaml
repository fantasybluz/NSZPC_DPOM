apiVersion: apps/v1
kind: Deployment
metadata:
  name: nszpc-app
  namespace: nszpc
  labels:
    app: nszpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nszpc
  template:
    metadata:
      labels:
        app: nszpc
    spec:
      containers:
        - name: nszpc
          image: nszpc-dpom:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DB_HOST
              value: "nszpc-postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "nszpc"
            - name: DB_USER
              value: "nszpc"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nszpc-db-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: uploads
              mountPath: /app/data/uploads
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: nszpc-uploads-pvc
