apiVersion: apps/v1
kind: Deployment
metadata:
  name: nszpc-nginx
  namespace: nszpc
  labels:
    app: nszpc-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nszpc-nginx
  template:
    metadata:
      labels:
        app: nszpc-nginx
    spec:
      containers:
        - name: nginx
          image: nszpc-nginx:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nszpc-nginx
  namespace: nszpc
spec:
  type: NodePort
  selector:
    app: nszpc-nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
