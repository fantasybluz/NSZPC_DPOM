<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星辰電腦 NSZPC 管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="d-flex" id="app">
    <!-- 側邊欄 -->
    <nav id="sidebar" class="sidebar bg-dark text-white">
      <div class="sidebar-header p-3">
        <h5 class="mb-0"><i class="bi bi-pc-display"></i> 星辰電腦</h5>
      </div>
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link active" href="#" data-page="dashboard">
            <i class="bi bi-speedometer2"></i> 儀表板
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-page="inventory">
            <i class="bi bi-box-seam"></i> 庫存管理
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-page="quotations">
            <i class="bi bi-receipt"></i> 客戶估價
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-page="suppliers">
            <i class="bi bi-chat-dots"></i> 盤商即時報價
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-page="customers">
            <i class="bi bi-people"></i> 客戶管理
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-page="youtube">
            <i class="bi bi-people-fill"></i> 社群追蹤
          </a>
        </li>
      </ul>
    </nav>

    <!-- 主內容 -->
    <main class="main-content flex-grow-1">
      <div class="top-bar d-flex justify-content-between align-items-center p-3 bg-white border-bottom">
        <button class="btn btn-sm btn-outline-secondary d-md-none" id="toggleSidebar">
          <i class="bi bi-list"></i>
        </button>
        <h5 class="mb-0" id="pageTitle">儀表板</h5>
        <span class="text-muted small" id="currentTime"></span>
      </div>
      <div class="p-4" id="pageContent">
        <!-- 動態內容 -->
      </div>
    </main>
  </div>

  <!-- 通用 Modal -->
  <div class="modal fade" id="mainModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer" id="modalFooter"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/draggable.js"></script>
  <script src="js/pagination.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/inventory.js"></script>
  <script src="js/pages/quotations.js"></script>
  <script src="js/pages/suppliers.js"></script>
  <script src="js/pages/customers.js"></script>
  <script src="js/pages/social.js"></script>
  <script src="js/pages/purchases.js"></script>
  <script src="js/pages/reports.js"></script>
  <script src="js/pages/categories.js"></script>
  <script src="js/pages/users.js"></script>
</body>
</html>
